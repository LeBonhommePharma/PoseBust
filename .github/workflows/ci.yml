name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build cmake g++-14
          echo "CXX=g++-14" >> "$GITHUB_ENV"
      - name: Configure
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
            -DPOSEBUST_BUILD_TESTS=ON -DPOSEBUST_BUILD_CLI=ON
      - name: Build
        run: cmake --build build -j 4
      - name: Test
        run: ctest --test-dir build --output-on-failure
      - name: CLI help smoke
        run: ./build/posebust --help
